name: Build and release app

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*'

permissions: {}

jobs:
  build:
    name: Build, sign and release app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4 # zizmor: ignore[cache-poisoning]
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Build APKs
        run: ./gradlew assembleFullRelease assembleFullDebug assembleFullDebugAndroidTest --no-daemon

      - name: Sign APK
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        if: ${{ env.KEYSTORE != '' }}
        uses: ilharp/sign-android-release@2034987c31e3959f7c97e88d5e656e52e6e88bd8 # v1
        id: sign
        with:
          releaseDir: app/build/outputs/apk/full/release
          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename and Sign APK
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SIGNED_FILE: ${{ steps.sign.outputs.signedFile }}
        run: |
          if [ "$KEYSTORE" != "" ]; then
            mv "$SIGNED_FILE" "app-release.apk"
          else
            echo "No production keystore secret set — using committed debug signing key for consistent APK signatures."
            APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -r | head -n 1)
            "$APKSIGNER" sign --ks app/debug-signing.keystore --ks-pass pass:android123 --ks-key-alias privateaitranslate --key-pass pass:android123 app/build/outputs/apk/full/release/app-full-release-unsigned.apk
            mv app/build/outputs/apk/full/release/app-full-release-unsigned.apk "app-release.apk"
          fi
          cp app/build/outputs/apk/full/debug/app-full-debug.apk app-full-debug.apk
          cp app/build/outputs/apk/androidTest/full/debug/app-full-debug-androidTest.apk app-full-debug-androidTest.apk

      - name: Create changelog
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        continue-on-error: true
        uses: requarks/changelog-action@b78a3354a01f4a1affb484b9264b506a815c46b1 # v1
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2 # zizmor: ignore[superfluous-actions]
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changes || 'Manual release build' }}
          files: |
            app-release.apk
            app-full-debug.apk
            app-full-debug-androidTest.apk
          fail_on_unmatched_files: true
          make_latest: true

  build-no-internet:
    name: Build, sign and release no-internet app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
