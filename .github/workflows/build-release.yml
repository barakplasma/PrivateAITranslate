          signingKey: ${{ secrets.KEYSTORE }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          buildToolsVersion: 35.0.0

      - name: Rename and Sign APK
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          SIGNED_FILE: ${{ steps.sign.outputs.signedFile }}
        run: |
          if [ "$KEYSTORE" != "" ]; then
            mv "$SIGNED_FILE" "app-release-no-internet.apk"
          else
            echo "No production keystore secret set — using committed debug signing key for consistent APK signatures."
            APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -r | head -n 1)
            "$APKSIGNER" sign --ks app/debug-signing.keystore --ks-pass pass:android123 --ks-key-alias privateaitranslate --key-pass pass:android123 app/build/outputs/apk/noInternet/release/app-noInternet-release-unsigned.apk
            mv app/build/outputs/apk/noInternet/release/app-noInternet-release-unsigned.apk "app-release-no-internet.apk"
          fi

      - name: Upload no-internet APK to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2 # zizmor: ignore[superfluous-actions]
        with:
          tag_name: ${{ github.ref_name }}
          files: "app-release-no-internet.apk"
          fail_on_unmatched_files: true

  build-pure-offline:
    name: Build, sign and release pure-offline app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4 # zizmor: ignore[cache-poisoning]
        with:
