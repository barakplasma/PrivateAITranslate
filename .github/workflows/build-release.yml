          java-version: "17"
          cache: "gradle"

      - name: Build no-internet APK
        run: ./gradlew assembleNoInternetRelease --no-daemon

      - name: Sign APK
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
        if: ${{ env.KEYSTORE != '' }}
        uses: ilharp/sign-android-release@2034987c31e3959f7c97e88d5e656e52e6e88bd8 # v1
        id: sign
        with:
