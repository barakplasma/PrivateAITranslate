          else
            echo "No production keystore secret set — using committed debug signing key for consistent APK signatures."
            APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -r | head -n 1)
            "$APKSIGNER" sign --ks app/debug-signing.keystore --ks-pass pass:android123 --ks-key-alias privateaitranslate --key-pass pass:android123 app/build/outputs/apk/pureOffline/release/app-pureOffline-release-unsigned.apk
            mv app/build/outputs/apk/pureOffline/release/app-pureOffline-release-unsigned.apk "app-release-pure-offline.apk"
          fi

      - name: Upload pure-offline APK to release
