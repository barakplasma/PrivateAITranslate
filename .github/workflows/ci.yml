name: CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "README*.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"

permissions: {}

jobs:
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6 # zizmor: ignore[cache-poisoning]
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Resolve Gradle dependencies
        run: >
          ./gradlew :app:dependencies
          --configuration fullReleaseRuntimeClasspath
          --console=plain
          > deps.txt

      - name: Convert to CycloneDX SBOM
        run: |
          python3 - << 'PYEOF'
          import re, json, uuid

          deps = set()
          with open("deps.txt") as f:
              for line in f:
                  m = re.search(
                      r"([a-zA-Z0-9._-]+):([a-zA-Z0-9._-]+):([0-9][a-zA-Z0-9._-]*)"
                      r"(?:\s+->\s+([0-9][a-zA-Z0-9._-]*))?",
                      line,
                  )
                  if m:
                      group, name, declared, resolved = m.groups()
                      deps.add((group, name, resolved or declared))

          bom = {
              "bomFormat": "CycloneDX",
              "specVersion": "1.5",
              "serialNumber": f"urn:uuid:{uuid.uuid4()}",
              "version": 1,
              "components": [
                  {
                      "type": "library",
                      "name": name,
                      "group": group,
                      "version": version,
                      "purl": f"pkg:maven/{group}/{name}@{version}",
                  }
                  for group, name, version in sorted(deps)
              ],
          }

          with open("bom.json", "w") as f:
              json.dump(bom, f, indent=2)

          print(f"Generated SBOM with {len(bom['components'])} components")
          PYEOF

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 # zizmor: ignore[artipacked]
        with:
          name: sbom
          path: bom.json

  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    needs: generate-sbom
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download SBOM
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: sbom
          path: .

      - uses: oxsecurity/megalinter/flavors/java@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLY_FIXES: all
          APPLY_FIXES_EVENT: pull_request
          APPLY_FIXES_MODE: commit
          VALIDATE_ALL_CODEBASE: false
          SARIF_REPORTER: true

          LLM_ADVISOR_ENABLED: true
          LLM_PROVIDER: openai  # openai, anthropic, google, huggingface, mistral, deepseek, grok, ollama
          LLM_MODEL_NAME: openrouter/auto
          LLM_MAX_TOKENS: 1000
          LLM_TEMPERATURE: 0.1
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Upload MegaLinter scan results to GitHub Security tab
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15
        with:
            sarif_file: 'megalinter-reports/megalinter-report.sarif'

  debug-builds:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6 # zizmor: ignore[cache-poisoning]
        with:
          gradle-version: wrapper
          cache-provider: enhanced
          cache-read-only: false
          add-job-summary: on-failure
          validate-wrappers: true

      - name: Build APK
        run: ./gradlew assembleFullDebug

      - name: Upload APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4 # zizmor: ignore[artipacked]
        with:
          name: app
          path: app/build/outputs/apk/full/debug/*.apk
